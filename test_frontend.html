<!DOCTYPE html>
<html>
<head>
    <title>Frontend API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Healthcare Chatbot Frontend Test</h1>
    <p>Testing connection to: <strong>https://healthcarechatbot-rmii.onrender.com</strong></p>
    
    <button onclick="testHealthEndpoint()">Test Health Endpoint</button>
    <button onclick="testChatEndpoint()">Test Chat Endpoint</button>
    <button onclick="testBothEndpoints()">Test Both</button>
    
    <div id="results"></div>

    <script>
        const API_URL = 'https://healthcarechatbot-rmii.onrender.com';
        const resultsDiv = document.getElementById('results');

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            resultsDiv.appendChild(div);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        async function testHealthEndpoint() {
            addResult('Testing health endpoint...', 'loading');
            
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                if (response.ok) {
                    addResult(`✅ Health endpoint working: ${JSON.stringify(data)}`, 'success');
                } else {
                    addResult(`❌ Health endpoint failed: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Health endpoint error: ${error.message}`, 'error');
            }
        }

        async function testChatEndpoint() {
            addResult('Testing chat endpoint...', 'loading');
            
            try {
                const response = await fetch(`${API_URL}/webhooks/rest/webhook`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: 'hello' })
                });
                
                const data = await response.json();
                
                if (response.ok && data && data.length > 0) {
                    addResult(`✅ Chat endpoint working: "${data[0].text}"`, 'success');
                } else {
                    addResult(`❌ Chat endpoint failed: ${response.status}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Chat endpoint error: ${error.message}`, 'error');
            }
        }

        async function testBothEndpoints() {
            await testHealthEndpoint();
            await testChatEndpoint();
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            addResult('🚀 Frontend test page loaded', 'success');
            testBothEndpoints();
        });
    </script>
</body>
</html>
