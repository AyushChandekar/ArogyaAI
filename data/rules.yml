version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_iamabot

- rule: Handle out of scope questions
  steps:
  - intent: out_of_scope
  - action: utter_out_of_scope

- rule: Show language support
  steps:
  - intent: ask_languages
  - action: action_language_info_improved

- rule: Provide prevention tips
  steps:
  - intent: ask_prevention_tips
  - action: action_prevention_tips

- rule: Emergency help
  steps:
  - intent: ask_emergency_help
  - action: action_emergency_help

- rule: WHO guidelines
  steps:
  - intent: ask_who_guidelines
  - action: action_disease_info_improved

- rule: Vaccination schedule
  steps:
  - intent: ask_vaccination_schedule
  - action: action_vaccination_schedule

- rule: Symptom search
  steps:
  - intent: search_by_symptom
  - action: action_disease_info_improved

- rule: Home treatment
  steps:
  - intent: ask_home_treatment
  - action: action_disease_info_improved

- rule: When to see doctor
  steps:
  - intent: ask_when_see_doctor
  - action: action_disease_info_improved

- rule: Symptoms info
  steps:
  - intent: ask_symptoms_info
  - action: action_disease_info_improved

- rule: Say thanks response
  steps:
  - intent: thanks
  - action: utter_acknowledge

