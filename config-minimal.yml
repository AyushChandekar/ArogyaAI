# Healthcare Chatbot - Memory Optimized Configuration
# Designed for 512MB memory limit deployment
recipe: default.v1

# Healthcare Education Assistant
assistant_id: healthcare_educator

# Primary language is English
language: en

# Minimal NLU Pipeline for memory efficiency
pipeline:
  - name: WhitespaceTokenizer
  - name: CountVectorsFeaturizer
    analyzer: word
    min_ngram: 1
    max_ngram: 2
  - name: DIETClassifier
    epochs: 10  # Reduced from 50
    constrain_similarities: true
    model_confidence: softmax
    entity_recognition: true
  - name: EntitySynonymMapper
  - name: FallbackClassifier
    threshold: 0.4
    ambiguity_threshold: 0.1

# Minimal Core policies for memory efficiency
policies:
  - name: MemoizationPolicy
    max_history: 2  # Reduced from 3
  - name: RulePolicy
    core_fallback_threshold: 0.4
    core_fallback_action_name: "action_default_fallback"
    enable_fallback_prediction: true
  - name: TEDPolicy
    max_history: 3  # Reduced from 5
    epochs: 10      # Reduced from 50
    constrain_similarities: true