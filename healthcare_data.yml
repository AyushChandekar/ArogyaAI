diseases:
  malaria:
    name: "Malaria"
    category: "Parasitic Infection"
    icd_code: "B50-B54"
    overview: "Life-threatening disease transmitted by infected Anopheles mosquitoes"
    causes:
      - "Plasmodium parasites (P. falciparum, P. vivax, P. ovale, P. malariae)"
      - "Infected Anopheles mosquito bites"
      - "Blood transfusion (rare)"
      - "Mother to unborn child (rare)"
      - "Organ transplant (rare)"
    symptoms:
      early:
        - "Fever and chills"
        - "Headache"
        - "Nausea and vomiting"
        - "Muscle aches"
        - "Fatigue"
      severe:
        - "Severe anemia"
        - "Respiratory distress"
        - "Cerebral malaria"
        - "Organ failure"
        - "Low blood sugar"
    prevention:
      - "Sleep under insecticide-treated nets"
      - "Use indoor residual spraying"
      - "Drain stagnant water sources"
      - "Use mosquito repellents containing DEET"
      - "Wear long-sleeved clothing at dusk and dawn"
      - "Take antimalarial medication if traveling to endemic areas"
    home_treatment:
      - "Rest and stay hydrated"
      - "Take paracetamol for fever (NOT aspirin)"
      - "ORS for dehydration"
      - "Light, nutritious meals"
      - "Monitor temperature regularly"
      - "Seek immediate medical help - no complete home cure"
    when_to_see_doctor:
      - "Any fever in malaria-endemic areas"
      - "Severe headache with fever"
      - "Persistent vomiting"
      - "Confusion or altered consciousness"
      - "Difficulty breathing"
      - "Dark or bloody urine"
    complications:
      - "Cerebral malaria"
      - "Pulmonary edema"
      - "Kidney failure"
      - "Severe anemia"
      - "Hypoglycemia"
    transmission: "Female Anopheles mosquito bite"
    incubation_period: "7-30 days"
    who_guidelines: "WHO recommends vector control, case management, and preventive treatments"

  dengue:
    name: "Dengue Fever"
    category: "Viral Infection"
    icd_code: "A90-A91"
    overview: "Mosquito-borne viral infection causing flu-like illness"
    causes:
      - "Dengue virus (DENV-1, DENV-2, DENV-3, DENV-4)"
      - "Aedes aegypti mosquito bites"
      - "Aedes albopictus mosquito bites"
      - "Blood transfusion (rare)"
      - "Mother to child transmission (rare)"
    symptoms:
      mild:
        - "High fever (40°C/104°F)"
        - "Severe headache"
        - "Pain behind eyes"
        - "Muscle and joint pain"
        - "Skin rash"
      severe:
        - "Severe abdominal pain"
        - "Persistent vomiting"
        - "Rapid breathing"
        - "Bleeding gums"
        - "Blood in vomit"
        - "Restlessness/fatigue"
    prevention:
      - "Remove standing water from containers"
      - "Use air conditioning or window screens"
      - "Wear long-sleeved shirts and long pants"
      - "Use mosquito repellent with DEET, picaridin, or oil of lemon eucalyptus"
      - "Support community vector control programs"
    home_treatment:
      - "Rest and increase fluid intake"
      - "Use paracetamol for fever and pain"
      - "Avoid aspirin and ibuprofen"
      - "ORS for hydration"
      - "Monitor platelet count"
      - "Watch for warning signs"
    when_to_see_doctor:
      - "Severe abdominal pain"
      - "Persistent vomiting (>3 times/day)"
      - "Bleeding (nose, gums)"
      - "Difficulty breathing"
      - "Blood in vomit or stool"
      - "Drop in platelet count"
    complications:
      - "Dengue hemorrhagic fever"
      - "Dengue shock syndrome"
      - "Plasma leakage"
      - "Severe bleeding"
      - "Organ impairment"
    transmission: "Aedes mosquito bite"
    incubation_period: "4-7 days"
    who_guidelines: "Early recognition, case management, vector surveillance and control"

  tuberculosis:
    name: "Tuberculosis (TB)"
    category: "Bacterial Infection"
    icd_code: "A15-A19"
    overview: "Infectious disease mainly affecting lungs, caused by Mycobacterium tuberculosis"
    causes:
      - "Mycobacterium tuberculosis bacteria"
      - "Airborne transmission through droplets"
      - "Close contact with active TB patient"
      - "Weakened immune system"
      - "Malnutrition"
    symptoms:
      pulmonary:
        - "Persistent cough (>3 weeks)"
        - "Coughing up blood or sputum"
        - "Chest pain or breathing difficulty"
        - "Unintentional weight loss"
        - "Fatigue"
        - "Fever and night sweats"
      extrapulmonary:
        - "Swollen lymph nodes"
        - "Abdominal pain"
        - "Joint pain and swelling"
        - "Confusion or mental changes"
        - "Back pain (spinal TB)"
    prevention:
      - "BCG vaccination in infancy"
      - "Avoid close contact with TB patients"
      - "Improve ventilation in living spaces"
      - "Cover mouth when coughing/sneezing"
      - "Complete treatment if infected"
      - "Regular screening for high-risk groups"
    home_treatment:
      - "Take prescribed medications regularly"
      - "Eat nutritious diet"
      - "Get plenty of rest"
      - "Isolate until non-infectious"
      - "Cover mouth when coughing"
      - "Follow up with healthcare provider"
    when_to_see_doctor:
      - "Cough lasting >3 weeks"
      - "Coughing up blood"
      - "Unexplained weight loss"
      - "Persistent fever"
      - "Night sweats"
      - "Contact with TB patient"
    complications:
      - "Spinal pain (spinal TB)"
      - "Joint damage"
      - "Swelling of membranes around brain"
      - "Liver or kidney problems"
      - "Heart disorders"
    transmission: "Airborne droplets"
    incubation_period: "2-12 weeks"
    who_guidelines: "DOTS (Directly Observed Treatment Short-course) strategy"

  diabetes:
    name: "Diabetes Mellitus"
    category: "Metabolic Disorder"
    icd_code: "E10-E14"
    overview: "Group of metabolic disorders characterized by high blood sugar"
    causes:
      - "Type 1: Autoimmune destruction of insulin-producing cells"
      - "Type 2: Insulin resistance and relative insulin deficiency"
      - "Gestational: Hormonal changes during pregnancy"
      - "Genetic factors"
      - "Lifestyle factors (diet, exercise, obesity)"
    symptoms:
      common:
        - "Increased thirst (polydipsia)"
        - "Frequent urination (polyuria)"
        - "Extreme hunger (polyphagia)"
        - "Unexplained weight loss"
        - "Fatigue"
        - "Blurred vision"
      complications:
        - "Slow-healing sores"
        - "Frequent infections"
        - "Numbness in hands/feet"
        - "Kidney problems"
        - "Eye problems"
    prevention:
      - "Maintain healthy weight"
      - "Exercise regularly (150 min/week)"
      - "Eat balanced diet low in sugar and processed foods"
      - "Avoid smoking"
      - "Limit alcohol consumption"
      - "Regular health screenings"
    home_treatment:
      - "Monitor blood glucose levels"
      - "Take medications as prescribed"
      - "Follow diabetic diet plan"
      - "Regular exercise"
      - "Maintain healthy weight"
      - "Foot care and regular check-ups"
    when_to_see_doctor:
      - "Blood sugar >180 mg/dL consistently"
      - "Symptoms of ketoacidosis"
      - "Frequent infections"
      - "Slow-healing wounds"
      - "Vision changes"
      - "Numbness in extremities"
    complications:
      - "Heart disease and stroke"
      - "Kidney disease (nephropathy)"
      - "Eye damage (retinopathy)"
      - "Nerve damage (neuropathy)"
      - "Foot damage and amputation"
    transmission: "Not contagious - genetic and lifestyle factors"
    who_guidelines: "Prevention, early detection, and comprehensive care approach"

  hypertension:
    name: "Hypertension (High Blood Pressure)"
    category: "Cardiovascular Disease"
    icd_code: "I10-I16"
    overview: "Condition where blood pressure in arteries is persistently elevated"
    causes:
      - "Primary: Unknown cause (95% of cases)"
      - "Secondary: Kidney disease, hormonal disorders, medications"
      - "Genetic factors"
      - "Age and gender"
      - "Lifestyle factors"
    symptoms:
      mild:
        - "Often no symptoms (silent killer)"
        - "Occasional headaches"
        - "Shortness of breath"
        - "Dizziness"
      severe:
        - "Severe headaches"
        - "Chest pain"
        - "Difficulty breathing"
        - "Irregular heartbeat"
        - "Blood in urine"
        - "Vision problems"
    prevention:
      - "Maintain healthy weight (BMI <25)"
      - "Exercise regularly (30 min most days)"
      - "Limit sodium intake (<2.3g/day)"
      - "Eat potassium-rich foods"
      - "Limit alcohol consumption"
      - "Quit smoking"
    home_treatment:
      - "Monitor blood pressure regularly"
      - "Take medications as prescribed"
      - "DASH diet (fruits, vegetables, whole grains)"
      - "Regular moderate exercise"
      - "Stress management techniques"
      - "Adequate sleep (7-8 hours)"
    when_to_see_doctor:
      - "BP >140/90 on multiple readings"
      - "Severe headaches"
      - "Chest pain or shortness of breath"
      - "Vision changes"
      - "Blood in urine"
      - "Irregular heartbeat"
    complications:
      - "Heart attack"
      - "Stroke"
      - "Heart failure"
      - "Kidney disease"
      - "Vision loss"
      - "Sexual dysfunction"
    transmission: "Not contagious - genetic and lifestyle factors"
    who_guidelines: "HEARTS technical package for cardiovascular disease management"

  covid19:
    name: "COVID-19"
    category: "Viral Infection"
    icd_code: "U07.1"
    overview: "Respiratory illness caused by SARS-CoV-2 virus"
    causes:
      - "SARS-CoV-2 coronavirus"
      - "Respiratory droplets"
      - "Aerosol transmission"
      - "Contact with contaminated surfaces"
      - "Close contact with infected persons"
    symptoms:
      common:
        - "Fever or chills"
        - "Cough"
        - "Shortness of breath"
        - "Fatigue"
        - "Body aches"
        - "Headache"
        - "Loss of taste/smell"
      severe:
        - "Difficulty breathing"
        - "Persistent chest pain"
        - "Confusion"
        - "Inability to wake/stay awake"
        - "Bluish lips or face"
    prevention:
      - "Get vaccinated and boosted"
      - "Wear masks in crowded indoor areas"
      - "Maintain physical distance"
      - "Wash hands frequently with soap"
      - "Use alcohol-based hand sanitizer"
      - "Avoid touching face"
      - "Improve indoor ventilation"
    home_treatment:
      - "Rest and stay hydrated"
      - "Take paracetamol for fever"
      - "Isolate from others"
      - "Monitor oxygen levels if available"
      - "Light exercises if able"
      - "Seek medical help if symptoms worsen"
    when_to_see_doctor:
      - "Difficulty breathing"
      - "Persistent chest pain"
      - "New confusion"
      - "Inability to wake up"
      - "Bluish lips or face"
      - "High-risk individuals with mild symptoms"
    complications:
      - "Pneumonia"
      - "Acute respiratory distress"
      - "Multi-organ failure"
      - "Blood clots"
      - "Long COVID symptoms"
    transmission: "Respiratory droplets and aerosols"
    incubation_period: "2-14 days"
    who_guidelines: "Updated regularly based on current epidemiological situation"

  pneumonia:
    name: "Pneumonia"
    category: "Respiratory Infection"
    icd_code: "J12-J18"
    overview: "Infection that inflames air sacs in one or both lungs"
    causes:
      - "Bacteria (Streptococcus pneumoniae)"
      - "Viruses (influenza, COVID-19)"
      - "Fungi (in immunocompromised)"
      - "Mycoplasma pneumoniae"
      - "Aspiration of foreign material"
    symptoms:
      typical:
        - "Chest pain when breathing/coughing"
        - "Confusion (in adults 65+)"
        - "Cough with phlegm"
        - "Fatigue"
        - "Fever and chills"
        - "Shortness of breath"
      severe:
        - "High fever >101°F"
        - "Rapid breathing"
        - "Severe chest pain"
        - "Blue lips/fingernails"
        - "Confusion"
    prevention:
      - "Get pneumococcal vaccine"
      - "Annual flu vaccination"
      - "Practice good hygiene"
      - "Don't smoke"
      - "Strengthen immune system"
      - "Avoid close contact with sick people"
    home_treatment:
      - "Rest and drink plenty of fluids"
      - "Take prescribed antibiotics completely"
      - "Use humidifier or breathe steam"
      - "Take paracetamol for fever"
      - "Avoid cough suppressants"
      - "Get plenty of sleep"
    when_to_see_doctor:
      - "Difficulty breathing"
      - "Chest pain"
      - "Fever >101°F (38.3°C)"
      - "Persistent cough with pus"
      - "Worsening symptoms"
      - "High-risk individuals"
    complications:
      - "Bacteria in bloodstream"
      - "Fluid accumulation around lungs"
      - "Lung abscess"
      - "Respiratory failure"
    transmission: "Respiratory droplets"
    who_guidelines: "Integrated management of childhood illness (IMCI)"

vaccination_schedules:
  newborn_0_2_months:
    age_range: "Birth to 2 months"
    vaccines:
      - name: "BCG"
        timing: "At birth or within 72 hours"
        protects_against: "Tuberculosis"
        dose: "Single dose"
        who_recommendation: "Countries with high TB burden"
        side_effects: "Local swelling, small scar"
      - name: "Hepatitis B (Birth dose)"
        timing: "Within 24 hours of birth"
        protects_against: "Hepatitis B"
        dose: "First dose"
        who_recommendation: "Universal recommendation"
        side_effects: "Mild fever, soreness at injection site"
      - name: "OPV (Birth dose)"
        timing: "At birth"
        protects_against: "Polio"
        dose: "Birth dose"
        who_recommendation: "Countries using OPV"
        side_effects: "Very rare - vaccine-derived poliovirus"

  infants_2_12_months:
    age_range: "2 to 12 months"
    vaccines:
      - name: "Pentavalent (DPT-HepB-Hib)"
        timing: "6, 10, 14 weeks"
        protects_against: "Diphtheria, Pertussis, Tetanus, Hepatitis B, Haemophilus influenzae type b"
        dose: "3 doses"
        who_recommendation: "Universal recommendation"
        side_effects: "Fever, irritability, swelling at injection site"
      - name: "Rotavirus"
        timing: "6, 10, 14 weeks"
        protects_against: "Rotavirus diarrhea"
        dose: "2-3 doses (depending on vaccine type)"
        who_recommendation: "Recommended globally"
        side_effects: "Mild diarrhea, irritability"
      - name: "Pneumococcal (PCV)"
        timing: "6, 10, 14 weeks + booster at 12-15 months"
        protects_against: "Pneumococcal disease"
        dose: "3+1 schedule"
        who_recommendation: "Recommended globally"
        side_effects: "Fever, redness at injection site"

  children_1_5_years:
    age_range: "12 months to 5 years"
    vaccines:
      - name: "MMR (Measles-Mumps-Rubella)"
        timing: "12-15 months, 4-6 years"
        protects_against: "Measles, Mumps, Rubella"
        dose: "2 doses"
        who_recommendation: "Universal recommendation"
        side_effects: "Fever, mild rash, swollen glands"
      - name: "Varicella (Chickenpox)"
        timing: "12-15 months, 4-6 years"
        protects_against: "Varicella (Chickenpox)"
        dose: "2 doses"
        who_recommendation: "Recommended in some countries"
        side_effects: "Mild fever, rash at injection site"

  adults_20_64_years:
    age_range: "20 to 64 years"
    vaccines:
      - name: "COVID-19"
        timing: "As per national guidelines"
        protects_against: "COVID-19"
        dose: "Primary series + boosters"
        who_recommendation: "Universal recommendation"
        side_effects: "Pain at injection site, fatigue, headache"
      - name: "Influenza (Flu)"
        timing: "Annually, before flu season"
        protects_against: "Seasonal influenza"
        dose: "Annual dose"
        who_recommendation: "Universal recommendation"
        side_effects: "Soreness at injection site, low-grade fever"

emergency_info:
  numbers:
    india:
      medical_emergency: "108"
      police: "100"
      fire: "101"
      disaster_helpline: "1078"
      women_helpline: "1091"
      child_helpline: "1098"
      poison_control: "1800-11-4444"
    international:
      usa: "911"
      uk: "999"
      europe: "112"
      australia: "000"
  procedures:
    heart_attack:
      - "Call emergency services immediately"
      - "Give aspirin if not allergic"
      - "Loosen tight clothing"
      - "Keep person calm and sitting"
      - "Monitor breathing and pulse"
      - "Be prepared to perform CPR"
    stroke:
      - "Call emergency services immediately"
      - "Note time symptoms started"
      - "Keep person calm and lying down"
      - "Do not give food or water"
      - "Monitor breathing"
      - "FAST check: Face, Arms, Speech, Time"
    choking:
      - "Encourage coughing"
      - "Give 5 back blows between shoulder blades"
      - "Give 5 abdominal thrusts (Heimlich)"
      - "Repeat until object dislodged"
      - "Call emergency if unconscious"
      - "Begin CPR if needed"

prevention_guidelines:
  infectious_disease_prevention:
    hand_hygiene:
      - "Wash hands with soap and water for 20 seconds"
      - "Use alcohol-based hand sanitizer (60%+ alcohol)"
      - "Clean hands before eating, after bathroom, after coughing"
      - "Avoid touching eyes, nose, mouth with unwashed hands"
      - "Clean hands after touching surfaces in public"
    respiratory_etiquette:
      - "Cover cough/sneeze with tissue or elbow"
      - "Dispose of tissues immediately"
      - "Wash hands after coughing/sneezing"
      - "Wear mask when sick in public"
      - "Stay home when ill"
    food_safety:
      - "Cook food to safe temperatures"
      - "Refrigerate perishables promptly"
      - "Avoid cross-contamination"
      - "Wash fruits and vegetables"
      - "Use safe water sources"
      - "Practice good kitchen hygiene"

  vector_borne_disease_prevention:
    mosquito_control:
      - "Remove standing water from containers"
      - "Use bed nets treated with insecticide"
      - "Apply mosquito repellent containing DEET"
      - "Wear long sleeves and pants during dawn/dusk"
      - "Use air conditioning or window screens"
      - "Support community vector control programs"

  chronic_disease_prevention:
    cardiovascular_health:
      - "Maintain healthy blood pressure (<120/80)"
      - "Keep cholesterol levels in check"
      - "Don't smoke or use tobacco"
      - "Exercise regularly (150 min/week moderate intensity)"
      - "Maintain healthy weight (BMI 18.5-24.9)"
      - "Eat heart-healthy diet (fruits, vegetables, whole grains)"
      - "Limit alcohol consumption"
      - "Manage stress effectively"
      - "Get adequate sleep (7-9 hours/night)"
